<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cotizador Pokémon TCG</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #f5c518;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --radius: 10px;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.25rem 1rem;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .logo-ball {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(180deg, var(--accent) 50%, #fff 50%);
    border: 2px solid var(--border);
    position: relative;
  }
  .logo-ball::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--border);
  }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .main { max-width: 600px; margin: 0 auto; padding: 1.25rem; }

  /* Sheet config */
  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.25rem;
  }
  .config-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px;
  }
  .config-row { display: flex; gap: 8px; align-items: center; }
  input[type="text"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-size: 13px;
    padding: 8px 10px; outline: none; font-family: var(--mono);
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: #555; }
  .btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 8px 14px;
    border-radius: 7px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--surface2); border-color: #444; }
  .btn-primary {
    background: var(--accent); border-color: var(--accent);
    color: #000; font-weight: 600;
  }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }
  .status-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    display: inline-block; margin-top: 8px;
  }
  .tag-ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-err { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-load { background: var(--surface2); color: var(--muted); }

  /* Deck input */
  .deck-box { margin-bottom: 1.25rem; }
  .deck-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .format-hint { font-weight: 400; text-transform: none; letter-spacing: 0; font-family: var(--mono); }
  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 13px;
    font-family: var(--mono); padding: 12px; line-height: 1.7;
    outline: none; resize: vertical; min-height: 160px;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #555; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  /* Results */
  #results { display: none; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em;
    margin: 1.25rem 0 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .card.unavailable { opacity: 0.6; }
  .card-left { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .card-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px; margin-top: 5px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-no { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-partial { background: rgba(249,115,22,0.15); color: var(--orange); }

  .card-right { text-align: right; flex-shrink: 0; }
  .price-unit { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .price-sub { font-size: 16px; font-weight: 600; }

  /* Summary */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-top: 1.25rem;
  }
  .sum-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
  .sum-row.total {
    border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px;
    font-size: 18px; font-weight: 700;
  }
  .sum-row .label { color: var(--muted); }
  .sum-row.total .label { color: var(--text); }
  .accent-val { color: var(--accent); }

  .empty-state {
    text-align: center; padding: 2rem; color: var(--muted);
    font-size: 13px; background: var(--surface);
    border: 1px dashed var(--border); border-radius: var(--radius);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 10px 18px;
    border-radius: 30px; z-index: 999; display: none;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

  @media (max-width: 480px) {
    .main { padding: 1rem; }
    .config-row { flex-wrap: wrap; }
    .config-row input { min-width: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ball"></div>
    <h1>Cotizador TCG</h1>
  </div>
  <div class="subtitle">Pega tu lista de deck y ve precios al instante</div>
</header>

<div class="main">

  <div class="config-box">
    <div class="config-label">Inventario (Google Sheet ID)</div>
    <div class="config-row">
      <input type="text" id="sheetId" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
      <button class="btn" onclick="testSheet()">Probar</button>
    </div>
    <div id="sheetStatus" style="display:none"></div>
  </div>

  <div class="deck-box">
    <div class="deck-label">
      <span>Lista del deck</span>
      <span class="format-hint" style="color:#666">cantidad Nombre SET 000</span>
    </div>
    <textarea id="deckInput" placeholder="4 Chikorita PAL 001
2 Meganium TEF 016
4 Boss's Orders PAL 172
2 Professor's Research SVI 189"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="cotizar()">Cotizar lista</button>
      <button class="btn" onclick="clearAll()">Limpiar</button>
    </div>
  </div>

  <div id="results">
    <div id="disponiblesSection"></div>
    <div id="parcialesSection"></div>
    <div id="noDispSection"></div>
    <div id="summarySection"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'pkm_sheet_id';

function getStoredId() {
  try { return localStorage.getItem(STORAGE_KEY) || ''; } catch { return ''; }
}
function storeId(id) {
  try { localStorage.setItem(STORAGE_KEY, id); } catch {}
}

document.getElementById('sheetId').value = getStoredId();

function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, ms);
}

async function fetchInventory(sheetId) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Inventario`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error('Formato inesperado');
  const json = JSON.parse(match[1]);
  if (!json.table || !json.table.rows) throw new Error('Sheet vacío o sin hoja "Inventario"');
  return json.table.rows.map(r => ({
    nombre: norm(r.c[0]?.v),
    set: norm(r.c[1]?.v),
    numero: String(r.c[2]?.v || '').trim(),
    stock: parseInt(r.c[3]?.v) || 0,
    precio: parseFloat(r.c[4]?.v) || 0
  })).filter(r => r.nombre);
}

function norm(v) {
  return String(v || '').trim().toLowerCase();
}

function parseLine(line) {
  const l = line.trim();
  if (!l || l.startsWith('//') || l.startsWith('#') || l.startsWith('*') || l.toLowerCase().startsWith('pokemon') || l.toLowerCase().startsWith('trainer') || l.toLowerCase().startsWith('energy')) return null;
  const m = l.match(/^(\d+)\s+(.+?)\s+([A-Za-z0-9\-]{2,8})\s+(\d{1,4}[a-z]?)$/i);
  if (!m) return null;
  return {
    qty: parseInt(m[1]),
    nombre: norm(m[2]),
    set: norm(m[3]),
    numero: m[4].trim(),
    display: m[2].trim()
  };
}

function findCard(inv, item) {
  return (
    inv.find(c => c.nombre === item.nombre && c.set === item.set && c.numero === item.numero) ||
    inv.find(c => c.nombre === item.nombre && c.numero === item.numero) ||
    inv.find(c => c.nombre === item.nombre && c.set === item.set)
  );
}

function clp(n) {
  return '$\u00a0' + Math.round(n).toLocaleString('es-CL');
}

function cap(s) {
  return s.replace(/\b\w/g, c => c.toUpperCase());
}

async function testSheet() {
  const id = document.getElementById('sheetId').value.trim();
  const el = document.getElementById('sheetStatus');
  el.style.display = 'block';
  el.className = 'status-tag tag-load';
  el.textContent = 'Conectando…';
  if (!id) { el.className = 'status-tag tag-err'; el.textContent = 'Ingresa un Sheet ID'; return; }
  try {
    const inv = await fetchInventory(id);
    storeId(id);
    el.className = 'status-tag tag-ok';
    el.textContent = '✓ ' + inv.length + ' cartas cargadas';
  } catch(e) {
    el.className = 'status-tag tag-err';
    el.textContent = 'Error: ' + e.message + ' — verifica el ID y que el sheet sea público (Vista > cualquier persona con el link)';
  }
}

async function cotizar() {
  const id = document.getElementById('sheetId').value.trim();
  const raw = document.getElementById('deckInput').value.trim();
  if (!id) { showToast('Configura el Sheet ID primero'); return; }
  if (!raw) { showToast('Pega una lista de deck'); return; }

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  document.getElementById('disponiblesSection').innerHTML = '<div class="empty-state">Cargando inventario…</div>';
  ['parcialesSection','noDispSection','summarySection'].forEach(id => document.getElementById(id).innerHTML = '');

  let inv;
  try {
    inv = await fetchInventory(id);
    storeId(id);
  } catch(e) {
    document.getElementById('disponiblesSection').innerHTML = `<div class="empty-state">No se pudo cargar el inventario.<br><small>${e.message}</small></div>`;
    return;
  }

  const items = raw.split('\n').map(parseLine).filter(Boolean);
  if (!items.length) {
    document.getElementById('disponiblesSection').innerHTML = '<div class="empty-state">No se reconoció ninguna carta.<br>Formato esperado: <code>4 Nombre SET 000</code></div>';
    return;
  }

  const ok = [], parcial = [], nope = [];
  for (const item of items) {
    const found = findCard(inv, item);
    if (!found || found.stock === 0) { nope.push({...item, sinStock: found && found.stock === 0}); continue; }
    if (found.stock < item.qty) { parcial.push({...item, found, disp: found.stock}); }
    else { ok.push({...item, found}); }
  }

  function cardHTML(item, mode) {
    const disp = mode === 'parcial' ? item.disp : item.qty;
    const sub = mode !== 'nope' ? disp * item.found.precio : 0;
    const badge = mode === 'ok'
      ? `<span class="card-badge badge-ok">En stock</span>`
      : mode === 'parcial'
      ? `<span class="card-badge badge-partial">Parcial — ${item.disp}/${item.qty}</span>`
      : `<span class="card-badge badge-no">${item.sinStock ? 'Sin stock' : 'No en inventario'}</span>`;
    const priceHTML = mode !== 'nope' ? `
      <div class="card-right">
        <div class="price-unit">${clp(item.found.precio)} c/u × ${disp}</div>
        <div class="price-sub">${clp(sub)}</div>
      </div>` : '';
    return `<div class="card${mode === 'nope' ? ' unavailable' : ''}">
      <div class="card-left">
        <div class="card-name">${cap(item.display || item.nombre)}</div>
        <div class="card-meta">${item.set.toUpperCase()} ${item.numero}</div>
        ${badge}
      </div>${priceHTML}
    </div>`;
  }

  document.getElementById('disponiblesSection').innerHTML = ok.length
    ? `<div class="section-label">Disponibles (${ok.length})</div>` + ok.map(i => cardHTML(i,'ok')).join('')
    : '';
  document.getElementById('parcialesSection').innerHTML = parcial.length
    ? `<div class="section-label">Stock parcial (${parcial.length})</div>` + parcial.map(i => cardHTML(i,'parcial')).join('')
    : '';
  document.getElementById('noDispSection').innerHTML = nope.length
    ? `<div class="section-label">No disponibles (${nope.length})</div>` + nope.map(i => cardHTML(i,'nope')).join('')
    : '';

  const totalOk = ok.reduce((s,d) => s + d.qty * d.found.precio, 0);
  const totalParcial = parcial.reduce((s,d) => s + d.disp * d.found.precio, 0);
  const totalGeneral = totalOk + totalParcial;
  const cartasSi = ok.reduce((s,d) => s + d.qty, 0) + parcial.reduce((s,d) => s + d.disp, 0);
  const cartasNo = nope.reduce((s,d) => s + d.qty, 0);
  const totalItems = items.reduce((s,d) => s + d.qty, 0);

  document.getElementById('summarySection').innerHTML = `
    <div class="summary-box">
      <div class="sum-row"><span class="label">Cartas disponibles</span><span>${cartasSi} de ${totalItems}</span></div>
      <div class="sum-row"><span class="label">No disponibles</span><span>${cartasNo} cartas</span></div>
      <div class="sum-row total"><span class="label">Total cotización</span><span class="accent-val">${clp(totalGeneral)}</span></div>
    </div>`;
}

function clearAll() {
  document.getElementById('deckInput').value = '';
  document.getElementById('results').style.display = 'none';
}
</script>
</body>
</html>
